<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Vitae - Patrik Pluderi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        line-height: 1.5;
    }

    .container {
        max-width: 1000px;
        margin: 60px auto;
        background: #111827;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        display: grid;
        grid-template-columns: 300px 1fr;
    }

    .sidebar {
        background: linear-gradient(180deg, #1e293b, #020617);
        padding: 40px 25px;
        border-right: 1px solid #374151;
    }

    /* Stile per le immagini Profilo e QR */
    .header-pics {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
    }

    .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #38bdf8;
    }

    .qr-img {
        width: 70px;
        height: 70px;
        border-radius: 8px;
        border: 1px solid #38bdf8;
        background: white;
        padding: 2px;
    }

    .sidebar h1 {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        margin-bottom: 10px;
        color: #fff;
    }

    .sidebar p {
        font-size: 14px;
        color: #9ca3af;
        margin: 5px 0;
    }

    /* Grassetto solo per le etichette */
    b, strong {
        color: #fff;
        font-weight: 600;
    }

    .section {
        margin-top: 30px;
    }

    .section h2 {
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #38bdf8;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        padding-bottom: 5px;
    }

    .section ul {
        list-style: none;
        padding: 0;
    }

    .section ul li {
        margin-bottom: 8px;
        font-size: 14px;
    }

    .languages {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    .lang {
        text-align: center;
        width: 60px;
    }
    .lang p {
        font-size: 11px;
        margin-top: 5px;
        color: #fff;
    }
    .circle {
        width: 50px;
        height: 50px;
        border: 3px solid #38bdf8;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        margin: 0 auto;
    }

    .main {
        padding: 50px;
    }

    .block {
        margin-bottom: 40px;
    }

    .block h2 {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        margin-bottom: 15px;
        border-bottom: 1px solid #374151;
        padding-bottom: 5px;
        color: #38bdf8;
    }

    .item {
        margin-bottom: 25px;
    }

    .item p {
        font-size: 14px;
        white-space: pre-line;
        margin: 0;
    }

    .footer {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: #6b7280;
        border-top: 1px solid #374151;
        grid-column: span 2;
    }

    @media(max-width: 800px) {
        .container {
            grid-template-columns: 1fr;
        }
        .footer {
            grid-column: span 1;
        }
    }
</style>
</head>
<body>

            <img src="imageQrcode.png" alt="QR Code" class="qr-img">
        </div>

        <p><b>Data di nascita:</b> 21/07/1975</p>
